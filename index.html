<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <style>
    body {
      font-family: Arial;
      background:url(https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1920&q=80)no-repeat center/cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background:transparent;
      padding: 10px;
      border-radius: 10px;
color:white;
size:50;
font:bold;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      width: 70%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
button {
  width: 70%;
  padding: 10px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(45deg, #ff9933, #ffffff, #138808);;
  color: black;
  font-size: 20px;
  cursor: pointer;
  transition: 0.3s;
 }

    button:hover {
      background: #e96b50;
    }
  </style>
</head>
<body>
<div class="container">
  <h2> Register</h2>

  <input type="text" id="username" placeholder="Enter Username" required>
  <input type="password" id="password" placeholder="Enter Password" required>
 <input type="email" id="email" placeholder="Enter email" required>



  <button onclick="register()">Create Account</button>

  <p>Already have an account? <a href="login11.html">Login</a></p>
</div>

<script>
function register() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;
let email = document.getElementById("email").value;



  if(user === "" || pass === "") {
    alert("Please fill all fields!");
    return;
  }

  // Store data
  localStorage.setItem("username", user);
  localStorage.setItem("password", pass);
localStorage.setItem("email",email);



  alert("Registration Successful 🇮🇳");

  // Redirect to login page
  window.location.href = "login11.html";
}
</script>

</body>
</html>
